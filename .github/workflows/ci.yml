name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment:
          - esp32s3dev
          - esp32s2dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio==6.1.18

      - name: Build ${{ matrix.environment }}
        run: pio run -e ${{ matrix.environment }}

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio-native-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio==6.1.18

      - name: Enforce core timing guard
        run: python tools/check_core_timing_guard.py

      - name: Run native tests
        run: pio test -e native

  validate-library:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio==6.1.18

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install --yes doxygen graphviz

      - name: Enforce example CLI contract
        run: python tools/check_cli_contract.py

      - name: Enforce native ESP-IDF example contract
        run: python tools/check_idf_example_contract.py

      - name: Enforce HIL runner contract
        run: python tools/check_hil_contract.py

      - name: Run HIL parser tests
        run: python tools/test_run_i2c_hil_parser.py

      - name: Validate generated version header
        run: python scripts/generate_version.py check

      - name: Validate API documentation
        run: doxygen Doxyfile

      - name: Validate library package
        run: pio pkg pack

  idf-example-build:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.4.2
    strategy:
      fail-fast: false
      matrix:
        idf_target:
          - esp32s3
          - esp32s2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enforce native ESP-IDF example contract
        run: python tools/check_idf_example_contract.py

      - name: Validate generated version header
        run: python scripts/generate_version.py check

      - name: Build native ESP-IDF basic example (${{ matrix.idf_target }})
        shell: bash
        run: |
          . "${IDF_PATH:-/opt/esp/idf}/export.sh"
          idf.py -C examples/idf/basic set-target ${{ matrix.idf_target }} build
